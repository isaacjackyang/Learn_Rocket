adapter: balloon_challenge

challenge_repo_root: .external/BalloonPoppingChallenge
challenge_scenario_number: 0

strategies:
  - greedy_intercept
  - score_based
  - energy_aware

fixed_params:
  challenge_repo_root: .external/BalloonPoppingChallenge
  challenge_scenario_number: 0
  challenge_reward_mode: popped_count

population_size: 4
elite_count: 2
mutation_rate: 0.4
crossover_rate: 0.3
seeds_per_experiment: 1
generations: 2
base_seed: 7100

parameter_space:
  lookahead_time:
    type: float
    min: 0.8
    max: 2.0
  kp:
    type: float
    min: 0.6
    max: 2.5
  kd:
    type: float
    min: 0.05
    max: 0.8
  throttle:
    type: float
    min: 0.55
    max: 1.0
  max_tvc:
    type: float
    min: 5.0
    max: 15.0
  target_distance_weight:
    type: float
    min: 0.2
    max: 1.8
  target_angle_weight:
    type: float
    min: 0.2
    max: 1.8
  launch_wait_time:
    type: float
    min: 0.0
    max: 1.5
  launch_inclination_deg:
    type: float
    min: 80.0
    max: 90.0
  launch_heading_deg:
    type: float
    min: -20.0
    max: 20.0
  target_lock_duration:
    type: float
    min: 0.1
    max: 1.5
  switching_penalty:
    type: float
    min: 0.0
    max: 2.0
