adapter: activerocketpy
vendor_repo: vendor/ActiveRocketPy
terminate_on_apogee: true
bootstrap_configs:
  - results/best_agents/best_config.json
  - configs/energy_transfer_robust.yaml
  - configs/energy_aware.yaml
  - configs/rl_policy_wrapper_bc.yaml
strategies:
  - energy_aware
  - score_based
  - mpc_light
  - cem_planner
  - rl_policy_wrapper
population_size: 8
elite_count: 3
mutation_rate: 0.5
crossover_rate: 0.5
seeds_per_experiment: 3
generations: 5
base_seed: 5000
parameter_space:
  kp:
    min: 0.2
    max: 1.8
    sigma: 0.14
  kd:
    min: 0.0
    max: 0.5
    sigma: 0.05
  lookahead_time:
    min: 0.2
    max: 1.8
    sigma: 0.14
  max_tvc:
    min: 0.8
    max: 5.2
    sigma: 0.35
  throttle:
    min: 0.35
    max: 1.0
    sigma: 0.06
  target_distance_weight:
    min: 0.1
    max: 1.8
    sigma: 0.12
  target_angle_weight:
    min: 0.1
    max: 1.8
    sigma: 0.12
  target_height_weight:
    min: 0.0
    max: 1.0
    sigma: 0.08
  target_closure_weight:
    min: 0.0
    max: 1.2
    sigma: 0.08
  target_energy_weight:
    min: 0.2
    max: 1.5
    sigma: 0.08
  target_time_weight:
    min: 0.1
    max: 1.0
    sigma: 0.08
  target_crosswind_weight:
    min: 0.0
    max: 0.4
    sigma: 0.04
  switching_penalty:
    min: 0.3
    max: 1.5
    sigma: 0.1
  target_switch_margin:
    min: 0.0
    max: 1.0
    sigma: 0.08
  target_switch_cooldown_steps:
    min: 0
    max: 10
    sigma: 1.8
    type: int
  target_lock_duration:
    min: 0.0
    max: 8.0
    sigma: 0.8
  launch_wait_time:
    min: 0.0
    max: 0.6
    sigma: 0.05
  stabilize_duration:
    min: 0.3
    max: 1.4
    sigma: 0.08
  failsafe_tilt_rate:
    min: 1.0
    max: 6.0
    sigma: 0.35
  wind_comp_gain:
    min: 0.0
    max: 0.7
    sigma: 0.05
  desired_speed:
    min: 0.8
    max: 1.9
    sigma: 0.08
  desired_speed_floor:
    min: 0.9
    max: 1.5
    sigma: 0.05
  intercept_lead_scale:
    min: 0.5
    max: 1.2
    sigma: 0.06
  climb_bias_altitude_m:
    min: 500.0
    max: 1400.0
    sigma: 60.0
  climb_vertical_gain:
    min: 0.1
    max: 0.8
    sigma: 0.06
  climb_velocity_floor_mps:
    min: 20.0
    max: 60.0
    sigma: 3.0
  ascent_turn_scale:
    min: 0.1
    max: 0.6
    sigma: 0.05
  ascent_throttle_floor:
    min: 0.7
    max: 1.0
    sigma: 0.04
  minimum_intercept_altitude_m:
    min: 120.0
    max: 380.0
    sigma: 20.0
  branch_count:
    min: 4
    max: 10
    sigma: 1.5
    type: int
  horizon_s:
    min: 0.6
    max: 1.8
    sigma: 0.12
  alpha:
    min: 0.15
    max: 0.6
    sigma: 0.04
  beta:
    min: 0.05
    max: 0.35
    sigma: 0.03
  balloon_alpha:
    min: 0.1
    max: 0.45
    sigma: 0.03
  jump_threshold_m:
    min: 10.0
    max: 70.0
    sigma: 5.0
  position_noise_std_m:
    min: 0.0
    max: 5.0
    sigma: 0.4
  velocity_noise_std_mps:
    min: 0.0
    max: 1.0
    sigma: 0.08
  rocket_position_noise_std_m:
    min: 0.0
    max: 2.0
    sigma: 0.15
  rocket_velocity_noise_std_mps:
    min: 0.0
    max: 0.6
    sigma: 0.05
  wind_sensor_noise_std_mps:
    min: 0.0
    max: 1.0
    sigma: 0.08
  wind_surface_mps:
    min: 0.0
    max: 6.0
    sigma: 0.45
  wind_shear_mps:
    min: 0.0
    max: 8.0
    sigma: 0.55
  wind_gust_mps:
    min: 0.0
    max: 2.0
    sigma: 0.16
  balloon_radius_m:
    min: 18.0
    max: 36.0
    sigma: 1.5
  release_window_s:
    min: 18.0
    max: 45.0
    sigma: 2.4
  estimator_mode:
    choices:
      - alpha_beta
      - wind_aware
      - jitter_aware
  target_selector:
    choices:
      - score_based
      - reachable
      - energy_aware
  guidance_mode:
    choices:
      - predictive
      - short_horizon
      - cem
      - energy_aware
      - rl
  controller_mode:
    choices:
      - adaptive
